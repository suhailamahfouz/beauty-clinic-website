<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beauty Clinic - Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/products.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="images/Logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="products-page-body">

    <header class="navbar">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="specialists.html">Specialists</a></li>
            <li><a href="gallery.html">Gallery</a></li>
        </ul>
        
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="images/Logo.png" alt="Beauty Clinic Logo">
                <h2>The <span>Beauty</span> Clinic</h2>
            </a>
        </div>
        
        <ul class="nav-links">
            <li><a href="products.html" class="active">Products</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <div class="user-auth-area" style="display: flex; align-items: center; gap: 15px; margin-left: 20px;">
            <a href="login.html" class="nav-link" id="navLoginBtn" style="font-weight: 500;"><i class="fas fa-sign-in-alt"></i> Login</a>
            
            <div class="nav-profile" id="navProfile" style="display: none; position: relative; cursor: pointer;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-user-circle" style="font-size: 22px; color: var(--primary-pink);"></i>
                    <span id="navUserName" style="font-weight: 500; font-family: 'Poppins', sans-serif;">User</span>
                </div>
                
                <div id="clientDropdown" style="display: none; position: absolute; top: 130%; right: 0; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 8px; width: 160px; z-index: 1000; overflow: hidden;">
                    <a href="admin/dashboard.html" id="adminDashLink" style="display: none; padding: 12px 15px; display: block; color: #333; text-decoration: none; border-bottom: 1px solid #eee; font-size: 14px;"><i class="fas fa-tachometer-alt" style="color: var(--primary-pink);"></i> Dashboard</a>
                    <a href="profile.html" id="clientProfileLink" style="padding: 12px 15px; display: block; color: #333; text-decoration: none; border-bottom: 1px solid #eee; font-size: 14px;"><i class="fas fa-user-circle"></i> My Profile</a>
                    <a href="#" id="clientLogoutBtn" style="padding: 12px 15px; color: #dc3545; text-decoration: none; display: block; font-size: 14px;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
        <a href="booking.html" class="btn-book-nav">BOOK NOW</a>
    </header>

    <section class="products-header">
        <h1>Skincare Products</h1>
        <p>Premium medical-grade skincare products recommended by our experts.</p>
    </section>

    <section class="products-container" id="productsContainer"></section>

    <div class="floating-cart" title="View Cart" onclick="window.location.href='checkout.html'">
        🛒<span class="cart-badge" id="cartBadge">0</span>
    </div>

    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
