<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - The Beauty Clinic</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="images/Logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="specialists-page-body">

    <header class="navbar">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="specialists.html">Specialists</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
        </ul>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="images/Logo.png" alt="Beauty Clinic Logo">
                <h2>The <span>Beauty</span> Clinic</h2>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="products.html">Products</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <a href="booking.html" class="btn-book-nav">BOOK NOW</a>
    </header>

    <section class="gallery-header">
        <h1>Real Results</h1>
        <p>Explore our before and after gallery to see the transformative results of our expert aesthetic treatments.</p>
    </section>

    <section class="gallery-grid">
        
        <div class="ba-slider">
            <div class="ba-labels"><span>Before</span><span>After</span></div>
            <img src="images/before1.png" alt="Before" class="img-before">
            <img src="images/after1.png" alt="After" class="img-after">
            
            <input type="range" min="0" max="100" value="50" class="slider-input">
            <div class="slider-line"></div>
            <div class="slider-button"></div>
        </div>

        <div class="ba-slider">
            <div class="ba-labels"><span>Before</span><span>After</span></div>
            <img src="images/before2.png" alt="Before" class="img-before">
            <img src="images/after2.png" alt="After" class="img-after">
            
            <input type="range" min="0" max="100" value="50" class="slider-input">
            <div class="slider-line"></div>
            <div class="slider-button"></div>
        </div>

        <div class="ba-slider">
            <div class="ba-labels"><span>Before</span><span>After</span></div>
            <img src="images/before3.png" alt="Before" class="img-before">
            <img src="images/after3.png" alt="After" class="img-after">
            
            <input type="range" min="0" max="100" value="50" class="slider-input">
            <div class="slider-line"></div>
            <div class="slider-button"></div>
        </div>

    </section>

    <script src="js/script.js"></script>
</body>
</html>
